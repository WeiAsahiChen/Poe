<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>擲筊問神</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8922a;
    --gold-light: #f0c060;
    --gold-bright: #ffe08a;
    --red: #8b1a1a;
    --red-deep: #5c0e0e;
    --dark: #1a0e05;
    --smoke: #f5efe6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--smoke);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(139,26,26,0.45) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 100%, rgba(200,146,42,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(200,146,42,0.18) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .smoke-container {
    position: fixed; bottom: 0; left: 50%;
    transform: translateX(-50%); width: 4px; z-index: 1; pointer-events: none;
  }
  .smoke-particle {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    background: rgba(200,146,42,0.25); animation: smokeRise linear infinite; filter: blur(4px);
  }
  @keyframes smokeRise {
    0%   { transform: translateX(0) translateY(0) scale(0.5); opacity: 0.7; }
    50%  { transform: translateX(18px) translateY(-200px) scale(2); opacity: 0.3; }
    100% { transform: translateX(-8px) translateY(-420px) scale(3.5); opacity: 0; }
  }

  .wrapper {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 40px 20px;
  }

  .header { text-align: center; margin-bottom: 36px; }
  .temple-line { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 8px; }
  .temple-line::before, .temple-line::after {
    content: ''; width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .temple-line::after { background: linear-gradient(to left, transparent, var(--gold)); }
  .subtitle { font-size: 0.85rem; color: var(--gold); letter-spacing: 0.4em; }
  h1 {
    font-family: 'Ma Shan Zheng', serif;
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    color: var(--gold-bright);
    text-shadow: 0 0 30px rgba(200,146,42,0.8), 0 0 60px rgba(200,146,42,0.4), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.15em;
  }
  .divider {
    width: 200px; height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 12px auto;
  }

  .question-area { width: 100%; max-width: 560px; margin-bottom: 36px; }
  .question-label { font-size: 0.9rem; color: var(--gold); letter-spacing: 0.2em; margin-bottom: 10px; text-align: center; display: block; }
  textarea {
    width: 100%; background: rgba(200,146,42,0.06); border: 1px solid rgba(200,146,42,0.3);
    border-radius: 4px; padding: 16px; color: var(--smoke); font-family: 'Noto Serif TC', serif;
    font-size: 1rem; resize: none; height: 90px; transition: border-color 0.3s, box-shadow 0.3s; line-height: 1.7;
  }
  textarea::placeholder { color: rgba(245,239,230,0.3); }
  textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 20px rgba(200,146,42,0.15); }

  /* ── 3D Jiaobei ── */
  .jiaobei-stage {
    display: flex; gap: 50px; align-items: flex-end; justify-content: center;
    margin-bottom: 52px;
  }

  .jiao-wrapper {
    width: 90px; height: 200px;
    position: relative;
    perspective: 800px;
  }

  .jiao-card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    /* start at 0 = flat face visible */
    transform: rotateY(0deg);
  }

  .jiao-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .jiao-face svg { width: 100%; height: 100%; }

  /* back face pre-flipped */
  .jiao-back { transform: rotateY(180deg); }

  /* face label below each piece */
  .face-label {
    position: absolute; bottom: -30px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem; white-space: nowrap;
    opacity: 0; transition: opacity 0.5s 0.3s;
    pointer-events: none; letter-spacing: 0.05em;
  }
  .face-label.flat   { color: #d4bfa0; }
  .face-label.curved { color: var(--gold-light); }
  .face-label.show   { opacity: 1; }

  /* ── Button ── */
  .throw-btn {
    display: block; margin: 0 auto;
    background: linear-gradient(135deg, var(--red-deep), var(--red));
    border: 2px solid var(--gold); color: var(--gold-bright);
    font-family: 'Ma Shan Zheng', serif; font-size: 1.6rem;
    letter-spacing: 0.3em; padding: 14px 50px; border-radius: 4px;
    cursor: pointer; transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(139,26,26,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .throw-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(139,26,26,0.7), 0 0 20px rgba(200,146,42,0.3);
    border-color: var(--gold-bright);
  }
  .throw-btn:active:not(:disabled) { transform: translateY(1px); }
  .throw-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ── Result ── */
  .result-area {
    width: 100%; max-width: 520px; margin-top: 40px;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s, transform 0.6s;
  }
  .result-area.visible { opacity: 1; transform: translateY(0); }
  .result-card {
    border: 1px solid; border-radius: 4px; padding: 28px;
    text-align: center; position: relative; overflow: hidden;
  }
  .result-card::before { content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: 4px; }
  .result-card.sheng { border-color: var(--gold); background: rgba(200,146,42,0.08); }
  .result-card.sheng::before { background: radial-gradient(ellipse at 50% 0%, rgba(200,146,42,0.15), transparent 70%); }
  .result-card.xiao  { border-color: rgba(200,146,42,0.4); background: rgba(139,26,26,0.08); }
  .result-card.xiao::before  { background: radial-gradient(ellipse at 50% 0%, rgba(139,26,26,0.15), transparent 70%); }
  .result-card.wu   { border-color: rgba(150,150,150,0.4); background: rgba(80,80,80,0.08); }
  .result-card.wu::before   { background: radial-gradient(ellipse at 50% 0%, rgba(100,100,100,0.15), transparent 70%); }
  .result-type { font-family: 'Ma Shan Zheng', serif; font-size: 2.8rem; margin-bottom: 8px; text-shadow: 0 0 20px currentColor; }
  .result-type.sheng { color: var(--gold-bright); }
  .result-type.xiao  { color: #e88080; }
  .result-type.wu   { color: #aaa; }
  .result-emoji { font-size: 2rem; margin-bottom: 12px; display: block; }
  .result-desc { font-size: 1.05rem; line-height: 1.9; color: rgba(245,239,230,0.85); margin-bottom: 16px; white-space: pre-line; }
  .result-meaning { font-size: 0.85rem; color: var(--gold); letter-spacing: 0.1em; padding-top: 12px; border-top: 1px solid rgba(200,146,42,0.2); }

  /* History */
  .history { width: 100%; max-width: 520px; margin-top: 32px; }
  .history-label { font-size: 0.8rem; color: var(--gold); letter-spacing: 0.2em; text-align: center; margin-bottom: 12px; opacity: 0.7; }
  .history-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .history-chip { padding: 4px 14px; border-radius: 20px; font-size: 0.8rem; border: 1px solid; animation: chipIn 0.3s ease; }
  @keyframes chipIn { from { opacity:0; transform:scale(0.7); } to { opacity:1; transform:scale(1); } }
  .history-chip.sheng { border-color: var(--gold); color: var(--gold-light); background: rgba(200,146,42,0.1); }
  .history-chip.xiao  { border-color: #e88080; color: #e88080; background: rgba(232,128,128,0.1); }
  .history-chip.wu   { border-color: #888; color: #aaa; background: rgba(136,136,136,0.1); }

  /* Prob */
  .prob-info { display: flex; justify-content: center; gap: 24px; margin-top: 32px; flex-wrap: wrap; }
  .prob-item { text-align: center; font-size: 0.78rem; color: rgba(245,239,230,0.5); }
  .prob-bar { width: 60px; height: 4px; background: rgba(200,146,42,0.15); border-radius: 2px; margin: 6px auto 4px; overflow: hidden; }
  .prob-fill { height: 100%; border-radius: 2px; }
  .prob-fill.sheng { background: var(--gold); width: 50%; }
  .prob-fill.xiao  { background: #e88080; width: 25%; }
  .prob-fill.wu   { background: #888; width: 25%; }

  @keyframes glow-burst {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(2.5); }
  }
  .glow-burst {
    position: fixed; top: 50%; left: 50%; width: 320px; height: 320px;
    border-radius: 50%; pointer-events: none; z-index: 100;
    animation: glow-burst 0.9s ease forwards;
  }

  .legend { display: flex; gap: 28px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: rgba(245,239,230,0.45); }
  .legend-flat { width: 16px; height: 32px; background: linear-gradient(#f0e8d6,#b09070); border-radius: 8px; border: 1px solid rgba(140,100,50,0.5); flex-shrink:0; }
  .legend-curved { width: 16px; height: 32px; background: radial-gradient(circle at 40% 35%, #c8922a, #3e1e00); border-radius: 8px; border: 1px solid rgba(200,140,40,0.5); flex-shrink:0; }

  .ornament { color: var(--gold); font-size: 1.2rem; opacity: 0.5; }
</style>
</head>
<body>

<div class="smoke-container" id="smokeContainer"></div>

<div class="wrapper">

  <header class="header">
    <div class="temple-line">
      <span class="ornament">⊹</span>
      <span class="subtitle">誠心問神・靜候神示</span>
      <span class="ornament">⊹</span>
    </div>
    <h1>擲筊問神</h1>
    <div class="divider"></div>
    <p style="font-size:0.82rem;color:rgba(245,239,230,0.4);letter-spacing:0.15em;">請以虔誠之心，向神明祈問</p>
  </header>

  <div class="question-area">
    <label class="question-label">〔 心中所問之事 〕</label>
    <textarea id="question" placeholder="請在此寫下您心中想問神明的事情，或默念心中的疑問……" maxlength="200"></textarea>
  </div>

  <!-- Stage -->
  <div class="jiaobei-stage">

    <!-- Left -->
    <div class="jiao-wrapper" id="wrapL">
      <div class="jiao-card" id="cardL">
        <!-- FRONT: 正面 flat (平面) - light tan wood -->
        <div class="jiao-face jiao-front">
          <svg viewBox="0 0 90 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="fg1" x1="15%" y1="0%" x2="85%" y2="100%">
                <stop offset="0%"   stop-color="#efe4cc"/>
                <stop offset="40%"  stop-color="#cdb896"/>
                <stop offset="100%" stop-color="#a07850"/>
              </linearGradient>
              <filter id="fs1"><feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="rgba(0,0,0,0.5)"/></filter>
              <clipPath id="cp1">
                <path d="M45,6 C12,6 5,50 5,100 C5,150 12,194 45,194 C78,194 85,150 85,100 C85,50 78,6 45,6Z"/>
              </clipPath>
            </defs>
            <path d="M45,6 C12,6 5,50 5,100 C5,150 12,194 45,194 C78,194 85,150 85,100 C85,50 78,6 45,6Z"
                  fill="url(#fg1)" filter="url(#fs1)"/>
            <!-- wood grain -->
            <g clip-path="url(#cp1)" fill="none" stroke="rgba(120,80,30,0.22)" stroke-width="1">
              <path d="M20,42 Q45,34 70,42"/>
              <path d="M12,63 Q45,54 78,63"/>
              <path d="M10,85 Q45,74 80,85"/>
              <path d="M10,107 Q45,96 80,107"/>
              <path d="M11,129 Q45,118 79,129"/>
              <path d="M14,152 Q45,140 76,152"/>
              <path d="M20,172 Q45,161 70,172"/>
            </g>
            <!-- center spine dashed -->
            <line x1="45" y1="10" x2="45" y2="190" stroke="rgba(100,65,20,0.18)" stroke-width="1.2" stroke-dasharray="5 7"/>
            <!-- left highlight rim -->
            <path d="M45,9 C15,9 8,52 8,100 C8,148 15,191 45,191"
                  fill="none" stroke="rgba(255,240,200,0.4)" stroke-width="1.5"/>
            <!-- flat surface label -->
            <text x="45" y="102" text-anchor="middle" font-family="Noto Serif TC,serif" font-size="14" fill="rgba(80,50,15,0.5)">正</text>
            <text x="45" y="118" text-anchor="middle" font-family="Noto Serif TC,serif" font-size="10" fill="rgba(80,50,15,0.4)" letter-spacing="1">平面</text>
          </svg>
        </div>
        <!-- BACK: 背面 curved (弧面) - rich amber/dark wood, convex highlight -->
        <div class="jiao-face jiao-back">
          <svg viewBox="0 0 90 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="bg1" cx="45%" cy="38%" r="58%" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#d4a040"/>
                <stop offset="35%"  stop-color="#9b6418"/>
                <stop offset="75%"  stop-color="#5a2e00"/>
                <stop offset="100%" stop-color="#2e1200"/>
              </radialGradient>
              <filter id="bs1"><feDropShadow dx="-3" dy="6" stdDeviation="5" flood-color="rgba(0,0,0,0.6)"/></filter>
              <clipPath id="cp1b">
                <path d="M45,6 C12,6 5,50 5,100 C5,150 12,194 45,194 C78,194 85,150 85,100 C85,50 78,6 45,6Z"/>
              </clipPath>
            </defs>
            <path d="M45,6 C12,6 5,50 5,100 C5,150 12,194 45,194 C78,194 85,150 85,100 C85,50 78,6 45,6Z"
                  fill="url(#bg1)" filter="url(#bs1)"/>
            <!-- convex highlight ridge (thick → thin) -->
            <path d="M45,12 C44,55 44,145 45,188"
                  fill="none" stroke="rgba(255,210,90,0.55)" stroke-width="8" stroke-linecap="round"/>
            <path d="M45,12 C44,55 44,145 45,188"
                  fill="none" stroke="rgba(255,240,160,0.35)" stroke-width="3" stroke-linecap="round"/>
            <path d="M45,12 C44,55 44,145 45,188"
                  fill="none" stroke="rgba(255,255,220,0.2)" stroke-width="1.2" stroke-linecap="round"/>
            <!-- arc ribs suggesting dome curvature -->
            <g clip-path="url(#cp1b)" fill="none" stroke="rgba(255,170,40,0.13)" stroke-width="1.3">
              <path d="M16,48  Q45,31 74,48"/>
              <path d="M10,72  Q45,52 80,72"/>
              <path d="M9,98   Q45,76 81,98"/>
              <path d="M10,124 Q45,104 80,124"/>
              <path d="M16,150 Q45,130 74,150"/>
            </g>
            <!-- rim glow -->
            <path d="M45,9 C15,9 8,52 8,100 C8,148 15,191 45,191"
                  fill="none" stroke="rgba(200,130,30,0.6)" stroke-width="2"/>
            <path d="M45,9 C75,9 82,52 82,100 C82,148 75,191 45,191"
                  fill="none" stroke="rgba(30,10,0,0.7)" stroke-width="2"/>
            <!-- label -->
            <text x="45" y="102" text-anchor="middle" font-family="Noto Serif TC,serif" font-size="14" fill="rgba(255,215,100,0.55)">背</text>
            <text x="45" y="118" text-anchor="middle" font-family="Noto Serif TC,serif" font-size="10" fill="rgba(255,200,80,0.4)" letter-spacing="1">弧面</text>
          </svg>
        </div>
      </div>
      <div class="face-label" id="labelL"></div>
    </div>

    <!-- Right -->
    <div class="jiao-wrapper" id="wrapR">
      <div class="jiao-card" id="cardR">
        <!-- FRONT flat -->
        <div class="jiao-face jiao-front">
          <svg viewBox="0 0 90 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="fg2" x1="15%" y1="0%" x2="85%" y2="100%">
                <stop offset="0%"   stop-color="#efe4cc"/>
                <stop offset="40%"  stop-color="#cdb896"/>
                <stop offset="100%" stop-color="#a07850"/>
              </linearGradient>
              <filter id="fs2"><feDropShadow dx="3" dy="6" stdDeviation="5" flood-color="rgba(0,0,0,0.5)"/></filter>
              <clipPath id="cp2">
                <path d="M45,6 C12,6 5,50 5,100 C5,150 12,194 45,194 C78,194 85,150 85,100 C85,50 78,6 45,6Z"/>
              </clipPath>
            </defs>
            <path d="M45,6 C12,6 5,50 5,100 C5,150 12,194 45,194 C78,194 85,150 85,100 C85,50 78,6 45,6Z"
                  fill="url(#fg2)" filter="url(#fs2)"/>
            <g clip-path="url(#cp2)" fill="none" stroke="rgba(120,80,30,0.22)" stroke-width="1">
              <path d="M20,42 Q45,34 70,42"/>
              <path d="M12,63 Q45,54 78,63"/>
              <path d="M10,85 Q45,74 80,85"/>
              <path d="M10,107 Q45,96 80,107"/>
              <path d="M11,129 Q45,118 79,129"/>
              <path d="M14,152 Q45,140 76,152"/>
              <path d="M20,172 Q45,161 70,172"/>
            </g>
            <line x1="45" y1="10" x2="45" y2="190" stroke="rgba(100,65,20,0.18)" stroke-width="1.2" stroke-dasharray="5 7"/>
            <path d="M45,9 C15,9 8,52 8,100 C8,148 15,191 45,191" fill="none" stroke="rgba(255,240,200,0.4)" stroke-width="1.5"/>
            <text x="45" y="102" text-anchor="middle" font-family="Noto Serif TC,serif" font-size="14" fill="rgba(80,50,15,0.5)">正</text>
            <text x="45" y="118" text-anchor="middle" font-family="Noto Serif TC,serif" font-size="10" fill="rgba(80,50,15,0.4)" letter-spacing="1">平面</text>
          </svg>
        </div>
        <!-- BACK curved -->
        <div class="jiao-face jiao-back">
          <svg viewBox="0 0 90 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="bg2" cx="45%" cy="38%" r="58%" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#d4a040"/>
                <stop offset="35%"  stop-color="#9b6418"/>
                <stop offset="75%"  stop-color="#5a2e00"/>
                <stop offset="100%" stop-color="#2e1200"/>
              </radialGradient>
              <filter id="bs2"><feDropShadow dx="-3" dy="6" stdDeviation="5" flood-color="rgba(0,0,0,0.6)"/></filter>
              <clipPath id="cp2b">
                <path d="M45,6 C12,6 5,50 5,100 C5,150 12,194 45,194 C78,194 85,150 85,100 C85,50 78,6 45,6Z"/>
              </clipPath>
            </defs>
            <path d="M45,6 C12,6 5,50 5,100 C5,150 12,194 45,194 C78,194 85,150 85,100 C85,50 78,6 45,6Z"
                  fill="url(#bg2)" filter="url(#bs2)"/>
            <path d="M45,12 C44,55 44,145 45,188" fill="none" stroke="rgba(255,210,90,0.55)" stroke-width="8" stroke-linecap="round"/>
            <path d="M45,12 C44,55 44,145 45,188" fill="none" stroke="rgba(255,240,160,0.35)" stroke-width="3" stroke-linecap="round"/>
            <path d="M45,12 C44,55 44,145 45,188" fill="none" stroke="rgba(255,255,220,0.2)" stroke-width="1.2" stroke-linecap="round"/>
            <g clip-path="url(#cp2b)" fill="none" stroke="rgba(255,170,40,0.13)" stroke-width="1.3">
              <path d="M16,48  Q45,31 74,48"/>
              <path d="M10,72  Q45,52 80,72"/>
              <path d="M9,98   Q45,76 81,98"/>
              <path d="M10,124 Q45,104 80,124"/>
              <path d="M16,150 Q45,130 74,150"/>
            </g>
            <path d="M45,9 C15,9 8,52 8,100 C8,148 15,191 45,191" fill="none" stroke="rgba(200,130,30,0.6)" stroke-width="2"/>
            <path d="M45,9 C75,9 82,52 82,100 C82,148 75,191 45,191" fill="none" stroke="rgba(30,10,0,0.7)" stroke-width="2"/>
            <text x="45" y="102" text-anchor="middle" font-family="Noto Serif TC,serif" font-size="14" fill="rgba(255,215,100,0.55)">背</text>
            <text x="45" y="118" text-anchor="middle" font-family="Noto Serif TC,serif" font-size="10" fill="rgba(255,200,80,0.4)" letter-spacing="1">弧面</text>
          </svg>
        </div>
      </div>
      <div class="face-label" id="labelR"></div>
    </div>

  </div><!-- /stage -->

  <button class="throw-btn" id="throwBtn" onclick="throwJiao()">擲　筊</button>

  <div class="result-area" id="resultArea">
    <div class="result-card" id="resultCard">
      <div class="result-type" id="resultType"></div>
      <span class="result-emoji" id="resultEmoji"></span>
      <p class="result-desc" id="resultDesc"></p>
      <p class="result-meaning" id="resultMeaning"></p>
    </div>
  </div>

  <div class="history" id="historySection" style="display:none;">
    <p class="history-label">— 擲筊記錄 —</p>
    <div class="history-row" id="historyRow"></div>
  </div>

  <div class="prob-info">
    <div class="prob-item">
      <div>聖筊</div>
      <div class="prob-bar"><div class="prob-fill sheng"></div></div>
      <div>50%</div>
    </div>
    <div class="prob-item">
      <div>笑筊</div>
      <div class="prob-bar"><div class="prob-fill xiao"></div></div>
      <div>25%</div>
    </div>
    <div class="prob-item">
      <div>陰筊</div>
      <div class="prob-bar"><div class="prob-fill wu"></div></div>
      <div>25%</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="legend-flat"></span>正面（平面）</div>
    <div class="legend-item"><span class="legend-curved"></span>背面（弧面）</div>
  </div>

  <p style="margin-top:36px;font-size:0.75rem;color:rgba(245,239,230,0.2);letter-spacing:0.1em;text-align:center;">一擲乾坤・神明自有安排</p>

</div>

<script>
// Smoke
(function(){
  const sc = document.getElementById('smokeContainer');
  for(let i=0;i<7;i++){
    const p=document.createElement('div'); p.className='smoke-particle';
    p.style.left=(Math.random()*24-12)+'px';
    p.style.animationDuration=(3+Math.random()*3)+'s';
    p.style.animationDelay=(Math.random()*5)+'s';
    sc.appendChild(p);
  }
})();

const results = {
  sheng:{ label:'聖筊', emoji:'🙏',
    desc:'一正一反，神明應允。\n您所問之事，神明已聽聞，給予肯定回應。可繼續前行，神明保佑您。',
    meaning:'神明答應，事可成', cls:'sheng', faceL:'flat', faceR:'curved' },
  xiao:{ label:'笑筊', emoji:'😄',
    desc:'兩枚皆現正面（平面朝上），神明展顏而笑。\n所問之事尚不明確，或時機未到。請重新誠心默禱後再次詢問。',
    meaning:'神明微笑，問題不清或時機未到', cls:'xiao', faceL:'flat', faceR:'flat' },
  wu:{ label:'陰筊', emoji:'🚫',
    desc:'兩枚皆現背面（弧面朝上），神明搖頭婉拒。\n此事神明不允，請三思而後行，或重新思考所問之事。',
    meaning:'神明不允，此事需再思量', cls:'wu', faceL:'curved', faceR:'curved' }
};

let history = [];
let throwing = false;
let rotL = 0, rotR = 0;

function getResult(){
  const r=Math.random();
  return r<0.5?'sheng':r<0.75?'xiao':'wu';
}

// flat → rotateY(0)  → front face shows
// curved → rotateY(180) → back face shows
// We track cumulative rotation and add spins to land on correct face
function faceTargetAngle(face, currentRot){
  const targetFace = face==='flat' ? 0 : 180;
  // Normalize current to [0,360)
  const cur = ((currentRot % 360) + 360) % 360;
  // How far to spin to reach target (always go forward ≥360)
  let delta = targetFace - cur;
  if(delta < 0) delta += 360;
  // Add random full spins (2-4)
  const extraSpins = (2 + Math.floor(Math.random()*3)) * 360;
  return currentRot + delta + extraSpins;
}

function throwJiao(){
  if(throwing) return;
  throwing = true;
  document.getElementById('throwBtn').disabled = true;

  const cardL = document.getElementById('cardL');
  const cardR = document.getElementById('cardR');
  const wrapL = document.getElementById('wrapL');
  const wrapR = document.getElementById('wrapR');
  const labelL = document.getElementById('labelL');
  const labelR = document.getElementById('labelR');

  // Hide labels & result
  labelL.classList.remove('show');
  labelR.classList.remove('show');
  document.getElementById('resultArea').classList.remove('visible');

  const key = getResult();
  const res = results[key];

  const newRotL = faceTargetAngle(res.faceL, rotL);
  const newRotR = faceTargetAngle(res.faceR, rotR);

  // Toss upward
  wrapL.style.transition = 'transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)';
  wrapR.style.transition = 'transform 0.55s cubic-bezier(0.25,0.46,0.45,0.94)';
  wrapL.style.transform = 'translateY(-90px)';
  wrapR.style.transform = 'translateY(-110px)';

  // Spin during flight
  const dur = 1.35;
  cardL.style.transition = `transform ${dur}s cubic-bezier(0.2,0.6,0.4,1)`;
  cardR.style.transition = `transform ${dur+0.1}s cubic-bezier(0.2,0.6,0.4,1)`;
  cardL.style.transform = `rotateY(${newRotL}deg)`;
  cardR.style.transform = `rotateY(${newRotR}deg)`;

  // Land back down
  setTimeout(()=>{
    wrapL.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';
    wrapR.style.transition = 'transform 0.55s cubic-bezier(0.34,1.56,0.64,1)';
    wrapL.style.transform = 'translateY(0)';
    wrapR.style.transform = 'translateY(0)';
  }, 750);

  rotL = newRotL;
  rotR = newRotR;

  setTimeout(()=>{
    const faceNames = { flat:'正面（平面）', curved:'背面（弧面）' };
    labelL.textContent = faceNames[res.faceL];
    labelR.textContent = faceNames[res.faceR];
    labelL.className = 'face-label '+res.faceL+' show';
    labelR.className = 'face-label '+res.faceR+' show';
    showResult(key);
    throwing = false;
    document.getElementById('throwBtn').disabled = false;
  }, 1500);
}

function showResult(key){
  const d = results[key];
  document.getElementById('resultCard').className = 'result-card '+d.cls;
  const te = document.getElementById('resultType');
  te.className = 'result-type '+d.cls; te.textContent = d.label;
  document.getElementById('resultEmoji').textContent = d.emoji;
  document.getElementById('resultDesc').textContent = d.desc;
  document.getElementById('resultMeaning').textContent = d.meaning;

  const burst = document.createElement('div'); burst.className='glow-burst';
  const cols={sheng:'rgba(200,146,42,0.4)',xiao:'rgba(232,128,128,0.3)',wu:'rgba(120,120,120,0.25)'};
  burst.style.background=`radial-gradient(circle, ${cols[key]}, transparent 70%)`;
  document.body.appendChild(burst);
  setTimeout(()=>burst.remove(),1000);

  document.getElementById('resultArea').classList.add('visible');

  history.unshift(key);
  if(history.length>10) history.pop();
  const labels={sheng:'聖',xiao:'笑',wu:'陰'};
  document.getElementById('historySection').style.display='block';
  document.getElementById('historyRow').innerHTML=history.map(k=>`<span class="history-chip ${k}">${labels[k]}筊</span>`).join('');
}
</script>
</body>
</html>
